services:
  - type: web
    name: ecoride-back
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile.symfony
    buildCommand: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
    startCommand: php bin/console server:run 0.0.0.0:80
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: ecoride-db
          property: connectionString

databases:
  - name: ecoride-db
    plan: free
    engine: mysql
    version: 8.0
