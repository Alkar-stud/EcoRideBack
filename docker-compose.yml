version: '3.6'

services:
  db:
    image: mysql:8
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ecoride
      MYSQL_USER: ecoride
      MYSQL_PASSWORD: 'ePStl]LoOamt8dZ2'
    # Exposer le port 3306 pour un usage local si nécessaire
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  symfony:
    build: .
    container_name: ecoride_symfony
    environment:
      # Utiliser cette URL pour Fly.io
      # DATABASE_URL: "mysql://ecoride:ePStl]LoOamt8dZ2@db.internal:3306/ecoride"
      # Utilisez cette URL pour un usage local
      DATABASE_URL: "mysql://ecoride:ePStl]LoOamt8dZ2@localhost:3306/ecoride"
    depends_on:
      - db

volumes:
  db_data:

