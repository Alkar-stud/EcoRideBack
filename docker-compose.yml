version: '3.3'

services:
  database:
    image: mysql:8.0
    container_name: app_mysql
    restart: always
    volumes:
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD} # Utilise la variable d'environnement DB_PASSWORD
      MYSQL_DATABASE: ${DB_NAME}         # Utilise la variable d'environnement DB_NAME
      MYSQL_USER: ${DB_USER}             # Utilise la variable d'environnement DB_USER
      MYSQL_PASSWORD: ${DB_PASSWORD}     # Utilise la variable d'environnement DB_PASSWORD
    ports:
      - "3306:3306"

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_php
    depends_on:
      - database
    volumes:
      - ./:/var/www/html
    environment:
      DATABASE_URL: "mysql://app_user:app_password@database:3306/app_db"

volumes:
  mysql_data:
