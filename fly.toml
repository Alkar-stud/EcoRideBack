app = 'ecorideback'
primary_region = 'cdg'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']
[[services]]
  internal_port = 9000
  protocol = "tcp"

[[services.ports]]
  port = 80
[[services.tcp_checks]]
  interval = 10000
  timeout = 2000


app = "mon-projet-mysql"
primary_region = 'cdg'

[[services]]
  internal_port = 3306
  protocol = "tcp"

[[services.ports]]
  port = 3306
[[services.tcp_checks]]
  interval = 10000
  timeout = 2000


[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
